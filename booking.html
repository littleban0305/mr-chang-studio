<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        預約系統｜Mr. Chang
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <nav class="navbar">

        <img
            src="assets/logo.png"
            class="nav-logo"
            alt="Mr. Chang">

        <button id="menuBtn">
            ☰
        </button>

    </nav>

    <div
        id="mobileMenu"
        class="mobile-menu">
    </div>

    <main class="booking-page">

        <div class="booking-card">

            <a
                href="profile.html"
                class="back-home">

                ← 返回會員中心

            </a>

            <img
                src="assets/logo.png"
                class="auth-logo"
                alt="Mr. Chang">

            <h1>
                預約系統
            </h1>

            <p>
                選擇欲預約日期
            </p>

            <div class="member-type">

                一般會員

            </div>

            <div class="date-list">

                <button class="date-btn">
                    2026/07/25
                </button>

                <button class="date-btn">
                    2026/07/26
                </button>

                <button class="date-btn">
                    2026/07/27
                </button>

            </div>

            <div class="booking-info">

                <p>
                    每日上限：5 位
                </p>

                <p>
                    目前順位：3
                </p>

            </div>

            <button
                id="bookBtn"
                class="primary-btn">

                立即預約

            </button>

        </div>

    </main>

    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/booking.js"></script>

</body>

</html>
