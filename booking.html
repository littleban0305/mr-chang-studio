<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        預約系統｜Mr. Chang
    </title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">

</head>

<body>

    <nav class="navbar">

        <img
            src="assets/logo1.png"
            class="nav-logo"
            alt="Mr. Chang">

        <button id="menuBtn">
            ☰
        </button>

    </nav>

    <div
        id="mobileMenu"
        class="mobile-menu">
    </div>

    <main class="booking-page">

        <div class="booking-card">

            <a
                href="profile.html"
                class="back-home">

                ← 返回會員中心

            </a>

            <img
                src="assets/logo1.png"
                class="auth-logo"
                alt="Mr. Chang">

            <h1>
                預約系統
            </h1>
            
            <div class="booking-notice">
            
                <p>
                    請選擇欲預約日期。
                </p>
            
            </div>
            
            <div class="calendar-card">
            
                <div class="calendar-header">
            
                    <h2 id="monthTitle">
                        2026 年 8 月預約
                    </h2>
            
                </div>
            
                <div class="weekdays">
            
                    <span>日</span>
                    <span>一</span>
                    <span>二</span>
                    <span>三</span>
                    <span>四</span>
                    <span>五</span>
                    <span>六</span>
            
                </div>
            
                <div
                    id="calendarDays"
                    class="calendar-days">
            
                </div>
            
            </div>
            
            <button
                id="bookBtn"
                class="primary-btn">
            
                送出預約
            
            </button>

        </div>

    </main>

    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/booking.js"></script>

</body>

</html>
