<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mr. Chang 張老師工作室</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <nav class="navbar">
    
        <div class="logo">
            Mr. Chang
        </div>
    
        <button id="menuBtn">
            ☰
        </button>
    
    </nav>
    
    <div id="mobileMenu" class="mobile-menu">
    
        <a href="#">首頁</a>
        <a href="#">登入</a>
        <a href="#">註冊會員</a>
    
    </div>

    <main class="hero">
    
        <div class="hero-content">
    
            <span class="badge">
                PHYSICAL THERAPY
            </span>
    
            <h1>
                Mr. Chang
            </h1>
    
            <p class="subtitle">
                張老師工作室
            </p>
    
            <p class="description">
                專屬預約系統
            </p>
    
            <div class="hero-buttons">
    
                <button class="primary-btn">
                    Google 登入
                </button>
    
                <button class="secondary-btn">
                    註冊會員
                </button>
    
            </div>
    
        </div>
    
    </main>

    <section class="environment">

        <h2>環境介紹</h2>
    
        <div class="env-card">

            <img
                src="assets/images/clinic.jpg"
                alt="操作區">
        
            <span class="env-tag">
                操作區
            </span>
        
        </div>
    
        <div class="env-card">

            <img
                src="assets/images/waiting.jpg"
                alt="等待區">
        
            <span class="env-tag">
                等待區
            </span>
        
        </div>
    
    </section>

    <script src="js/script.js"></script>

</body>

</html>
