<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mr. Chang 張老師工作室</title>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>

<body>

    <nav class="navbar">
    
        <img src="assets/logo1.png" class="nav-logo">
    
        <button id="menuBtn">
            ☰
        </button>
    
    </nav>
    
    <div id="mobileMenu" class="mobile-menu">
    </div>

    <main class="hero">
    
        <div class="hero-content">
    
            <img
                src="assets/logo.png"
                class="brand-logo"
                alt="Mr. Chang 張老師工作室">
        
            <p class="description">
                專屬預約系統
            </p>
    
            <div class="hero-buttons">
            
                <a
                    href="login.html"
                    class="primary-btn">
            
                    Google 登入
            
                </a>
            
                <a
                    href="register.html"
                    class="secondary-btn">
            
                    註冊會員
            
                </a>
            
            </div>
    
        </div>
    
    </main>

    <section class="environment">

        <h2>環境介紹</h2>
    
        <div class="env-card">

            <img
                src="assets/images/clinic.jpg"
                alt="操作區">
        
            <span class="env-tag">
                操作區
            </span>
        
        </div>
    
        <div class="env-card">

            <img
                src="assets/images/waiting.jpg"
                alt="等待區">
        
            <span class="env-tag">
                等待區
            </span>
        
        </div>
    
    </section>

    <section class="location">

        <h2>工作室位置</h2>
    
        <div id="locationContent">
    
            <p>
                🔒 登入會員後可查看詳細地址
            </p>
    
        </div>
    
    </section>

    <script src="js/script.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/index.js"></script>

</body>

</html>
